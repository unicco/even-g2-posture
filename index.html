<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Posture Cat</title>
    <style>
      :root { --bg:#ededed; --card:#fff; --text:#1c1c1e; --sub:#8a8a8e; --line:#ececec; --accent:#34c759; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,system-ui,"Hiragino Sans",sans-serif; -webkit-font-smoothing:antialiased; padding:calc(env(safe-area-inset-top) + 8px) 16px 40px; }
      header { text-align:center; padding:16px 0 4px; }
      header h1 { font-size:22px; font-weight:600; margin:0; }
      header .tag { font-size:13px; color:var(--sub); margin-top:4px; }
      .card { background:var(--card); border-radius:16px; padding:18px; margin-top:16px; }
      .state { display:flex; align-items:center; gap:14px; }
      .state .face { font-size:42px; line-height:1; width:48px; text-align:center; }
      .state .msg { font-size:19px; font-weight:600; }
      .state .desc { font-size:13px; color:var(--sub); margin-top:3px; }
      .section { font-size:12px; color:var(--sub); margin:26px 6px 8px; }
      .row { padding:13px 2px; border-top:1px solid var(--line); font-size:15px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
      .row:first-child { border-top:none; }
      .row .val { color:var(--sub); font-size:14px; min-width:42px; text-align:right; }
      .rowcol { display:block; }
      .rowcol input[type=range] { width:100%; margin-top:10px; }
      input[type=number] { width:64px; font-size:15px; padding:6px 8px; border:1px solid var(--line); border-radius:8px; text-align:right; }
      .toggle { position:relative; width:46px; height:28px; flex:0 0 auto; }
      .toggle input { opacity:0; width:0; height:0; }
      .sw { position:absolute; inset:0; background:#d1d1d6; border-radius:14px; transition:.2s; }
      .sw:before { content:''; position:absolute; height:24px; width:24px; left:2px; top:2px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 2px rgba(0,0,0,.2); }
      .toggle input:checked + .sw { background:var(--accent); }
      .toggle input:checked + .sw:before { transform:translateX(18px); }
      .info { padding:13px 2px; border-top:1px solid var(--line); font-size:15px; }
      #tech { display:none; font-family:ui-monospace,monospace; font-size:12px; color:var(--sub); margin-top:14px; text-align:center; }
      .foot { text-align:center; font-size:12px; color:var(--sub); margin-top:26px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Posture Cat</h1>
      <div class="tag" id="tag">猫が背すじを見守ります</div>
    </header>

    <div class="card">
      <div class="state">
        <div class="face" id="face">⌛</div>
        <div>
          <div class="msg" id="stateMsg">…</div>
          <div class="desc" id="stateSub"></div>
        </div>
      </div>
    </div>

    <div class="section" id="secSettings">設定</div>
    <div class="card">
      <div class="row">
        <span id="lblDebug">デバッグ表示</span>
        <label class="toggle"><input type="checkbox" id="optDebug" /><span class="sw"></span></label>
      </div>
      <div class="row">
        <span id="lblDelay">反応までの秒数</span>
        <span><input type="number" id="optDelay" min="1" max="15" step="1" /> s</span>
      </div>
      <div class="row rowcol">
        <div style="display:flex;justify-content:space-between"><span id="lblConcern">「！」になる傾き X</span><span class="val" id="valConcern">-0.22</span></div>
        <input type="range" id="optConcern" min="-0.35" max="-0.08" step="0.01" />
      </div>
      <div class="row rowcol">
        <div style="display:flex;justify-content:space-between"><span id="lblSlump">ぐったりになる傾き X</span><span class="val" id="valSlump">-0.33</span></div>
        <input type="range" id="optSlump" min="-0.45" max="-0.20" step="0.01" />
      </div>
      <div class="info" style="display:flex;justify-content:space-between"><span id="lblCurrentX">現在の傾き X</span><span class="val" id="valX">-</span></div>
    </div>

    <div class="section" id="secHowto">使い方</div>
    <div class="card">
      <div class="row" id="step1">1. グラスを装着する</div>
      <div class="row" id="step2">2. うつむきが続くと猫が「！」で警告</div>
      <div class="row" id="step3">3. 背すじを伸ばすと猫が元気に戻る</div>
    </div>

    <div id="tech"></div>
    <div class="foot" id="foot">すべて端末内で動作・通信なし</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
