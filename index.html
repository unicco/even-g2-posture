<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Posture Cat</title>
    <style>
      :root {
        --bg: #ededed;
        --card: #ffffff;
        --text: #1c1c1e;
        --sub: #8a8a8e;
        --line: #ececec;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, system-ui, "Hiragino Sans", sans-serif;
        -webkit-font-smoothing: antialiased;
        padding: calc(env(safe-area-inset-top) + 8px) 16px 40px;
      }
      header { text-align: center; padding: 16px 0 4px; }
      header h1 { font-size: 22px; font-weight: 600; margin: 0; }
      header .tag { font-size: 13px; color: var(--sub); margin-top: 4px; }
      .card { background: var(--card); border-radius: 16px; padding: 18px; margin-top: 16px; }
      .state { display: flex; align-items: center; gap: 14px; }
      .state .face { font-size: 42px; line-height: 1; width: 48px; text-align: center; }
      .state .msg { font-size: 19px; font-weight: 600; }
      .state .desc { font-size: 13px; color: var(--sub); margin-top: 3px; }
      .section { font-size: 12px; color: var(--sub); margin: 26px 6px 8px; }
      .row { padding: 13px 2px; border-top: 1px solid var(--line); font-size: 15px; }
      .row:first-child { border-top: none; }
      #tech { display: none; font-family: ui-monospace, monospace; font-size: 12px; color: var(--sub); margin-top: 14px; text-align: center; }
      .foot { text-align: center; font-size: 12px; color: var(--sub); margin-top: 26px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Posture Cat</h1>
      <div class="tag">猫が背すじを見守ります</div>
    </header>

    <div class="card">
      <div class="state">
        <div class="face" id="face">⌛</div>
        <div>
          <div class="msg" id="stateMsg">グラスと接続中…</div>
          <div class="desc" id="stateSub">Even グラスを装着してください</div>
        </div>
      </div>
    </div>

    <div class="section">使い方</div>
    <div class="card">
      <div class="row">1. グラスを装着する</div>
      <div class="row">2. うつむきが続くと猫が「！」で警告</div>
      <div class="row">3. 背すじを伸ばすと猫が元気に戻る</div>
    </div>

    <div id="tech"></div>
    <div class="foot">すべて端末内で動作・通信なし</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
